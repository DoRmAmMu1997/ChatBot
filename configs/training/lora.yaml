# --------------------------------------------------------------------------
# LoRA / QLoRA fine-tuning.
#
# Parameter-efficient adaptation — freeze the base model and only train small
# rank-r matrices added in parallel to selected linear layers. With QLoRA the
# base is also loaded in 4-bit (NF4), making 50B-class fine-tunes possible on
# 2-4 high-end GPUs and 250B-class fine-tunes on 4-8.
# --------------------------------------------------------------------------

stage: "lora"

sequence_length: 4096

# LoRA-specific hyperparameters.
lora:
  rank: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    # Apply LoRA to all attention projections + the FFN gates. For MoE,
    # we deliberately skip the per-expert FFNs (would be ~256x more params
    # to train); patching the routing layer + shared expert is enough.
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  init_lora_weights: "kaiming"

# Optional QLoRA backend (loads base model in 4-bit via bitsandbytes).
qlora:
  enabled: false
  quant_type: "nf4"
  double_quant: true
  compute_dtype: "bfloat16"

data:
  mix:
    - { name: "tulu3_sft",      weight: 0.50 }
    - { name: "magicoder_evol", weight: 0.50 }
  shuffle_buffer: 20000
  num_workers: 2
  mask_user_turns: true

optimizer:
  name: "adamw"
  # LoRA tolerates higher LR than full fine-tune because the base is frozen.
  lr: 2.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.999]
  eps: 1.0e-8

scheduler:
  name: "cosine_with_warmup"
  warmup_steps: 50
  min_lr: 1.0e-5

micro_batch_size: 2
global_batch_size: 32
max_steps: 1000
eval_every: 100
save_every: 250
log_every: 25

grad_clip: 1.0
mixed_precision: "bf16"
gradient_checkpointing: true

# Distributed not required for LoRA — a single GPU usually suffices, but
# enabling FSDP works too.
distributed:
  backend: "none"

seed: 42
output_dir: "outputs/lora"
resume_from: null      # LoRA training starts from a frozen base checkpoint
base_checkpoint: "outputs/sft/latest"
