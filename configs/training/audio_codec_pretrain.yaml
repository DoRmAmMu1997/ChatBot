# --------------------------------------------------------------------------
# Audio codec autoencoder pretraining.
#
# Trains the EnCodec-style autoencoder so the 4096 codebook tokens become
# meaningful. The LLM only learns to *emit* those codes later (during
# omni-pretrain + omni-SFT), but it needs them to mean something audio-like
# first — that's what this stage produces.
# --------------------------------------------------------------------------

stage: "audio_codec_pretrain"

clip_seconds: 4

optimizer:
  name: "adamw"
  lr: 3.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.95]
  eps: 1.0e-8

scheduler:
  name: "cosine_with_warmup"
  warmup_steps: 200
  min_lr: 3.0e-5

grad_clip: 1.0
max_steps: 20000
eval_every: 500
save_every: 1000
log_every: 25

data:
  mix:
    - { name: "libritts",     weight: 0.4 }
    - { name: "librilight",   weight: 0.6 }
  num_workers: 2

mixed_precision: "bf16"
gradient_checkpointing: false

distributed:
  backend: "none"

seed: 42
output_dir: "outputs/codec_pretrain"
