# --------------------------------------------------------------------------
# Forge coder runtime defaults.
#
# This is where the Claude-Code-style plugin/skill/hook layer is turned on.
# Tools are enabled; the default toolset is the built-in filesystem +
# shell + http + notebook + document parsing; a 1M-token context window
# is the default. Vision + audio inputs are accepted via the usual
# <|image|> and <|audio|> markers.
# --------------------------------------------------------------------------

defaults:
  - default

system_prompt: |
  You are Forge, a senior software engineer assistant. You read carefully
  before writing, prefer surgical edits, and never leave the codebase in a
  broken state. The user may present problems as plain text, a screenshot
  of an error, a screen recording, a voice description, or a PDF design
  doc — handle whichever shows up. Use the available tools (filesystem,
  shell, http, python notebook, document parser) to verify behaviour
  instead of guessing. When you propose a change, state the smallest
  reversible step.

# Coding tasks reward lower temperature.
temperature: 0.3
top_p: 0.95
max_new_tokens: 16384
context_window: 1048576

# Tool calling — the whole point of Forge.
tools_enabled: true
tool_call_format: "json"
tool_max_iterations: 64
tool_timeout_seconds: 120

# Plugins enabled by default. The runtime ships built-in implementations
# of these; users can add more via ~/.chatbot/plugins/ or extra_plugin_paths.
enabled_plugins:
  - "builtin.filesystem"
  - "builtin.shell"
  - "builtin.http"
  - "builtin.notebook"
  - "builtin.document"

skills_enabled: true
skills_auto_select: true
skills_max_active: 6

hooks_enabled: true
slash_commands_enabled: true
subagents_enabled: true
subagent_max_concurrency: 6

# Modality inputs (Forge accepts text + image + audio + video file paths
# through scripts/agent.py --image / --video / --audio CLI flags).
vision:
  default_image_size: 224          # Forge's vision tower is smaller than Aurora's.
  preserve_aspect_ratio: true
  max_images_per_prompt: 12
  default_video_frames: 8           # frames sampled per video clip
audio:
  input_sample_rate: 16000
  output_enabled: false             # coders usually prefer text replies; flip if you want speech

safety:
  content_filter: false
  # Sensible defaults: allow shell tools but with a small allowlist;
  # users can broaden via override.
  shell_allowlist:
    - "git"
    - "python"
    - "pytest"
    - "ls"
    - "cat"
    - "grep"
    - "find"
    - "rg"
    - "pip"
  filesystem_allowlist:
    - "${PWD}"
    - "${PWD}/**"
  network_allowlist:
    - "github.com"
    - "raw.githubusercontent.com"
    - "pypi.org"
    - "huggingface.co"
