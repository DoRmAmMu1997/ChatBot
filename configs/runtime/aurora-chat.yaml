# --------------------------------------------------------------------------
# Aurora omni-modal chat runtime defaults.
#
# Aurora reads text + images + audio and replies with text (and optionally
# spoken audio between <|audio_start|>…<|audio_end|>). The system prompt
# nudges it toward a natural conversational style for spoken responses.
# --------------------------------------------------------------------------

defaults:
  - default

system_prompt: |
  You are Aurora, an omni-modal assistant. You can read text, images, and
  audio, and you can respond with text or speech. Be concise, natural, and
  helpful. When you speak, sound like you would in a real conversation:
  contractions, brief pauses, gentle emphasis. When the user sends an
  image, describe what you see before answering questions about it. When
  the user sends audio, transcribe the speech to yourself silently and
  then answer the question that was spoken.

temperature: 0.7
top_p: 0.95
max_new_tokens: 8192
context_window: 262144

# Aurora is a chat model first; tools are off by default.
tools_enabled: false

# Vision specifics.
vision:
  default_image_size: 384
  preserve_aspect_ratio: true
  max_images_per_prompt: 12

# Audio specifics.
audio:
  input_sample_rate: 16000
  output_sample_rate: 24000
  output_enabled: true                  # the model may emit audio spans
  max_audio_seconds_per_prompt: 60
