# --------------------------------------------------------------------------
# Tiny model config (~50M parameters).
#
# Smoke-test tier. Exercises every code path in the repo (dense + MoE +
# vision + audio I/O + plugin runtime) but is small enough to run on a
# laptop CPU or a single consumer GPU in minutes.
#
# Use this config to verify that the code works before you commit to
# renting H100s. Numbers will be terrible — the goal is to confirm shapes,
# training loops, and inference round-trips, not benchmark quality.
# --------------------------------------------------------------------------

family: aurora

# Core Transformer sizes.
d_model: 256
n_layers: 4
n_heads: 8
n_kv_heads: 2
head_dim: 32
ffn_hidden: 768
# Vocab = 32K text BPE + 2048 audio codes + ~32 specials, rounded.
vocab_size: 34112
max_position_embeddings: 4096

rms_norm_eps: 1.0e-5
rope_base: 10000.0
rope_scaling:
  type: "none"
  factor: 1.0

ffn:
  type: "swiglu"
  hidden: 768

moe:
  enabled: false
  num_routed_experts: 4
  num_shared_experts: 1
  num_active_experts: 2
  expert_hidden: 384
  router_jitter: 0.0
  load_balancing: "aux_loss_free"
  bias_update_speed: 1.0e-3

# Multimodal settings.
vision:
  enabled: true
  image_size: 224
  patch_size: 14
  vision_dim: 384
  vision_layers: 6
  vision_heads: 6
  connector_hidden: 512
  num_image_tokens: 256

audio:
  enabled: true
  n_mels: 80
  sample_rate: 16000
  encoder_dim: 256
  encoder_layers: 2
  encoder_heads: 4
  codec_sample_rate: 24000
  num_audio_codes: 2048

dropout: 0.0
init_std: 0.02
tie_embeddings: true

pad_token_id: 0
bos_token_id: 1
eos_token_id: 2
