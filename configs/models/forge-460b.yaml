# --------------------------------------------------------------------------
# Forge — Mixture-of-Experts coding/SWE/DevOps model (Opus-class).
#
# DeepSeek-V3-inspired fine-grained MoE with shared experts and the
# auxiliary-loss-free load-balancing bias trick. MLA replaces standard
# attention so the 1M-context KV cache stays manageable (~80 GB instead
# of ~500 GB plain GQA).
#
# Parameter budget (verified by direct math against the configs):
#   - Embeddings + LM head (204K vocab × 6656 d_model):    ~ 2.72 B
#   - MLA attention (72 layers × ~80.5M):                  ~ 5.80 B
#   - 3 dense FFN warm-up layers (SwiGLU 19968):           ~ 1.20 B
#   - 69 MoE layers × (160 routed + 1 shared + router):    ~ 454.4 B
#       └ each expert is 3 × 6656 × 2048 ≈ 40.89 M
#   - Vision tower + connector (224 px SigLIP-lite):       ~ 0.163 B
#   - Audio encoder (8-layer Conformer-ish):               ~ 0.150 B
#   - Total                                                ~ 464 B
#   - Active per token (8 of 160 routed + shared + dense): ~ 35.5 B
#
# The original README and the previous filename (forge-320b) understated
# the size — the config implies ~460B, which is still squarely in the
# Opus-class MoE neighbourhood (DeepSeek V3 is 671B/37B-active). The
# file is now named ``forge-460b.yaml`` so the headline number matches
# what the code actually builds.
# --------------------------------------------------------------------------

family: forge

d_model: 6656
n_layers: 72
n_heads: 52
n_kv_heads: 8
head_dim: 128
ffn_hidden: 19968
vocab_size: 204096
max_position_embeddings: 1048576

rms_norm_eps: 1.0e-6
rope_base: 50000000.0
rope_scaling:
  type: "yarn"
  factor: 32.0
  original_max_position_embeddings: 32768

attention:
  variant: "mla"
  q_lora_rank: 1536
  kv_lora_rank: 512
  qk_nope_head_dim: 128
  qk_rope_head_dim: 64
  v_head_dim: 128

ffn:
  type: "swiglu"
  hidden: 19968
  num_dense_layers: 3

moe:
  enabled: true
  num_routed_experts: 160
  num_shared_experts: 1
  num_active_experts: 8
  expert_hidden: 2048
  router_jitter: 0.0
  load_balancing: "aux_loss_free"
  bias_update_speed: 1.0e-3
  router_z_loss_coef: 1.0e-4
  aux_loss_coef: 0.0

# Vision tower (smaller than Aurora's — Forge reads code screenshots,
# not natural images, so 224 px and 12 layers suffices).
vision:
  enabled: true
  image_size: 224
  patch_size: 14
  vision_dim: 768
  vision_layers: 12
  vision_heads: 12
  connector_hidden: 6656
  num_image_tokens: 256

# Audio encoder (lighter than Aurora's — short voice descriptions of bugs).
audio:
  enabled: true
  n_mels: 128
  sample_rate: 16000
  encoder_dim: 1024
  encoder_layers: 8
  encoder_heads: 16
  codec_sample_rate: 24000
  num_audio_codes: 4096

dropout: 0.0
init_std: 0.02
tie_embeddings: false

pad_token_id: 0
bos_token_id: 1
eos_token_id: 2
